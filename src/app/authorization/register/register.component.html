<div class="d-flex flex-row bd-highlight mb-3">
    <div class="form-froup row">  

        <label class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
            <input type="email" class="form-control" [(ngModel)]="Email"
            placeholder="Enter Email">
        </div>

        <label class="col-sm-2 col-form-label">Name</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" [(ngModel)]="UserName"
            placeholder="Enter Name">
        </div>
        <label class="col-sm-2 col-form-label">Surname</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" [(ngModel)]="UserSurname"
            placeholder="Enter Surname">
        </div>
        <label class="col-sm-2 col-form-label">Middle name</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" [(ngModel)]="UserMiddleName"
            placeholder="Enter Middlename">
        </div>

        <label class="col-sm-2 col-form-label">Phone number</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" [(ngModel)]="PhoneNumber"
            placeholder="Enter Phone number">
        </div>
    
        <label class="col-sm-2 col-form-label">Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" [(ngModel)]="Password"
            placeholder="Enter Password">
        </div>   
        <label class="col-sm-2 col-form-label">Confirm Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" [(ngModel)]="PasswordConfirm"
            placeholder="Confirm Password">
        </div> 
    </div>
</div>  

<button (click)="registerUser()" class="btn btn-primary">
    Register
</button>
